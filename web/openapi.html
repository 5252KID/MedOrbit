<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedOrbit OpenAPI Docs</title>
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      body { margin: 0; background: #0b0f18; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.onload = () => {
        SwaggerUIBundle({
          url: "/openapi.yaml",
          dom_id: "#swagger-ui",
          layout: "BaseLayout",
          deepLinking: true,
        });
      };
    </script>
  </body>
</html>
